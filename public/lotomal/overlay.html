<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лото - Оверлей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: transparent !important;
        }

        body {
            background: transparent !important;
            font-family: 'Arial Black', 'Arial', sans-serif;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            color: #fff;
        }

        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 14px 18px;
            box-shadow: none;
        }

        .last-row {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            justify-content: center;
        }

        .last-label {
            color: #FFD700;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,215,0,0.6);
            white-space: nowrap;
        }

        .last-barrel {
            width: 88px;
            height: 88px;
            background: linear-gradient(145deg, #FFD700 0%, #DAA520 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            font-size: 60px;
            flex-shrink: 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6), inset 0 3px 6px rgba(255,255,255,0.35);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes pulse {
            0%,100% { transform:scale(1); box-shadow:0 6px 20px rgba(0,0,0,0.6),inset 0 3px 6px rgba(255,255,255,0.35),0 0 0 rgba(255,215,0,0.5); }
            50%     { transform:scale(1.06); box-shadow:0 6px 20px rgba(0,0,0,0.6),inset 0 3px 6px rgba(255,255,255,0.35),0 0 28px rgba(255,215,0,0.75); }
        }

        .last-barrel.new-barrel {
            animation: dropIn 0.7s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes dropIn {
            0%  { transform:scale(0) rotate(-180deg); opacity:0; }
            60% { transform:scale(1.25) rotate(12deg); }
            100%{ transform:scale(1) rotate(0deg); opacity:1; }
        }

        .counter-text {
            color: rgba(255,215,0,0.7);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            margin-top: 4px;
        }

        .divider {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg,transparent,rgba(255,215,0,0.4),transparent);
        }

        .barrels-grid {
            display: grid;
            grid-template-columns: repeat(8, 44px);
            gap: 5px;
            justify-content: center;
        }

        .barrel {
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #FFD700 0%, #DAA520 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            font-size: 26px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 2px 3px rgba(255,255,255,0.3);
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
            overflow: hidden;
        }

        .barrel.old { animation: none; }

        .barrel.new-pop {
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1), glowPop 1s ease-out;
        }

        @keyframes popIn {
            0%  { transform:scale(0); opacity:0; }
            60% { transform:scale(1.2); }
            100%{ transform:scale(1); opacity:1; }
        }

        @keyframes glowPop {
            0%  { box-shadow:0 3px 8px rgba(0,0,0,0.5),inset 0 2px 3px rgba(255,255,255,0.3),0 0 30px rgba(255,215,0,1); }
            100%{ box-shadow:0 3px 8px rgba(0,0,0,0.5),inset 0 2px 3px rgba(255,255,255,0.3); }
        }

        body.theme-framed .panel {
            background: rgba(0,0,0,0.32);
            border: 2px solid rgba(255,215,0,0.95);
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.45), 0 0 24px rgba(255,215,0,0.35);
            backdrop-filter: blur(4px);
        }

        body.theme-framed .last-barrel {
            border: 3px solid rgba(255,215,0,0.96);
            box-shadow:
                0 6px 20px rgba(0,0,0,0.6),
                inset 0 3px 6px rgba(255,255,255,0.35),
                0 0 0 3px rgba(255,215,0,0.3),
                0 0 26px rgba(255,215,0,0.65);
        }

        body.theme-framed .barrel {
            border: 2px solid rgba(255,215,0,0.85);
            box-shadow:
                0 3px 8px rgba(0,0,0,0.5),
                inset 0 2px 3px rgba(255,255,255,0.3),
                0 0 14px rgba(255,215,0,0.4);
        }

        body.theme-relay .panel {
            top: 14px;
            right: 14px;
            left: auto;
            width: 420px;
            padding: 10px 10px 12px;
            border-radius: 14px;
            border: none;
            background: rgba(0,0,0,0.16);
            backdrop-filter: blur(6px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.25);
            align-items: stretch;
        }

        body.theme-relay .last-row {
            justify-content: flex-start;
            margin-bottom: 4px;
        }

        body.theme-relay .last-label {
            color: rgba(255,255,255,0.88);
            text-shadow: 0 2px 10px rgba(0,0,0,0.55);
        }

        body.theme-relay .counter-text {
            color: rgba(255,255,255,0.72);
        }

        body.theme-relay .divider {
            background: linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
        }

        body.theme-relay .barrels-grid {
            width: 100%;
            grid-template-columns: repeat(8, minmax(0, 1fr));
            gap: 8px;
            justify-content: stretch;
        }

        body.theme-relay .last-barrel {
            width: 96px;
            height: 96px;
            color: #fff;
            font-size: 46px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.65);
            background:
                radial-gradient(circle at 30% 25%, rgba(255,255,255,0.22), transparent 45%),
                linear-gradient(145deg, #8a5a2b, #6f431a);
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow:
                0 14px 30px rgba(0,0,0,0.35),
                0 0 0 4px rgba(0,0,0,0.18),
                0 0 40px rgba(255,215,0,0.55);
            animation: relayGlow 1.6s ease-in-out infinite;
        }

        body.theme-relay .last-barrel::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,0.08) 0px,
                    rgba(255,255,255,0.08) 6px,
                    rgba(0,0,0,0.06) 10px,
                    rgba(0,0,0,0.06) 16px
                );
            mix-blend-mode: overlay;
            opacity: 0.45;
            pointer-events: none;
        }

        body.theme-relay .last-barrel::after {
            content: "";
            position: absolute;
            inset: 7px;
            border-radius: 999px;
            border: 3px solid rgba(255,255,255,0.85);
            box-shadow:
                inset 0 0 0 3px rgba(0,0,0,0.12),
                0 0 0 3px rgba(255,215,0,0.38),
                0 0 24px rgba(255,215,0,0.28);
            pointer-events: none;
        }

        @keyframes relayGlow {
            0%,100% { box-shadow:0 14px 30px rgba(0,0,0,0.35),0 0 0 4px rgba(0,0,0,0.18),0 0 34px rgba(255,215,0,0.28); }
            50%     { box-shadow:0 14px 30px rgba(0,0,0,0.35),0 0 0 4px rgba(0,0,0,0.18),0 0 56px rgba(255,215,0,0.55); }
        }

        body.theme-relay .barrel {
            width: auto;
            min-width: 0;
            height: 46px;
            border-radius: 999px;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.55);
            background:
                radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), transparent 45%),
                linear-gradient(145deg, #7b4d22, #5e3614);
            border: 2px solid rgba(255,255,255,0.14);
            box-shadow: 0 8px 18px rgba(0,0,0,0.28);
            opacity: 0.92;
        }

        body.theme-relay .barrel::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,0.07) 0px,
                    rgba(255,255,255,0.07) 6px,
                    rgba(0,0,0,0.06) 10px,
                    rgba(0,0,0,0.06) 16px
                );
            mix-blend-mode: overlay;
            opacity: 0.38;
            pointer-events: none;
        }

        body.theme-relay .barrel::after {
            content: "";
            position: absolute;
            inset: 6px;
            border-radius: 999px;
            border: 2px solid rgba(255,255,255,0.18);
            pointer-events: none;
        }

        body.theme-relay .barrel.new-pop {
            animation: relayChipPop 0.5s cubic-bezier(.16,.84,.3,1.1);
            outline: 3px solid rgba(255,255,255,0.75);
            box-shadow: 0 8px 18px rgba(0,0,0,0.28), 0 0 26px rgba(255,215,0,0.4);
        }

        @keyframes relayChipPop {
            0% { transform: scale(0.85); opacity: 0.65; }
            60% { transform: scale(1.10); opacity: 1; }
            100% { transform: scale(1); opacity: 0.95; }
        }
    </style>
</head>
<body>

<div class="panel" id="panel" style="display:none;">

    <div class="last-row">
        <div style="text-align:center;">
            <div class="last-label">ВЫПАЛ</div>
            <div class="counter-text" id="counterText">0 из 90</div>
        </div>
        <div class="last-barrel" id="lastBarrel">-</div>
    </div>

    <div class="divider" id="divider" style="display:none;"></div>

    <div class="barrels-grid" id="barrelsGrid"></div>

</div>

    <script src="/loto-realtime.js?v=12"></script>
    <script>
        function normalizeLobbyId(value) {
            if (value === null || value === undefined) return null;
            const normalized = String(value).trim();
            if (!normalized || normalized === 'undefined' || normalized === 'null') return null;
            return normalized;
        }

        const OVERLAY_VARIANT_STORAGE_KEY = 'lotomalOverlayVariant';
        const DEFAULT_OVERLAY_VARIANT = 'clean';
        const AVAILABLE_OVERLAY_VARIANTS = new Set(['clean', 'relay', 'framed']);

        function normalizeVariant(value) {
            const candidate = String(value || '').trim().toLowerCase();
            return AVAILABLE_OVERLAY_VARIANTS.has(candidate) ? candidate : DEFAULT_OVERLAY_VARIANT;
        }

        const query = new URLSearchParams(window.location.search);
        const variant = normalizeVariant(query.get('variant') || localStorage.getItem(OVERLAY_VARIANT_STORAGE_KEY));
        try { localStorage.setItem(OVERLAY_VARIANT_STORAGE_KEY, variant); } catch (_) {}
        document.body.classList.add('theme-' + variant);

        const lobbyId = normalizeLobbyId(query.get('lobbyId')) || normalizeLobbyId(localStorage.getItem('currentLobbyId'));
        if (lobbyId) localStorage.setItem('currentLobbyId', lobbyId);

        let drawnOrder = [];
        let lastNumber = null;
        let pollTimer = null;

        function handleStateUpdate(nextDrawn) {
            const newOrder = (nextDrawn || []).map(Number);
            const prevSet = new Set(drawnOrder);
            const newNumbers = newOrder.filter(n => !prevSet.has(n));
            drawnOrder = newOrder;

            const panel = document.getElementById('panel');
            if (drawnOrder.length === 0) { panel.style.display = 'none'; return; }
            panel.style.display = 'flex';

            const currentLast = drawnOrder[drawnOrder.length - 1];
            const lastEl = document.getElementById('lastBarrel');
            if (currentLast !== lastNumber) {
                lastNumber = currentLast;
                lastEl.textContent = currentLast;
                lastEl.classList.remove('new-barrel');
                void lastEl.offsetWidth;
                lastEl.classList.add('new-barrel');
                setTimeout(() => lastEl.classList.remove('new-barrel'), 700);
            }
            document.getElementById('counterText').textContent = drawnOrder.length + ' из 90';

            const prev = drawnOrder.slice(0, -1);
            const grid = document.getElementById('barrelsGrid');
            const divider = document.getElementById('divider');

            if (prev.length === 0) {
                grid.innerHTML = '';
                divider.style.display = 'none';
                return;
            }
            divider.style.display = 'block';

            if (grid.children.length !== prev.length || newNumbers.length > 0) {
                grid.innerHTML = '';
                prev.forEach(num => {
                    const b = document.createElement('div');
                    b.className = newNumbers.includes(num) ? 'barrel new-pop' : 'barrel old';
                    b.textContent = num;
                    grid.appendChild(b);
                });
            }
        }

        async function fetchState() {
            if (!lobbyId) return;
            try {
                const res = await fetch(`/api/loto?action=get_state&lobbyId=${encodeURIComponent(lobbyId)}`, { cache: 'no-store' });
                if (!res.ok) return;
                const payload = await res.json();
                if (payload?.type === 'no_change') return;
                const drawn = Array.isArray(payload?.drawn) ? payload.drawn : [];
                handleStateUpdate(drawn);
            } catch (_) {}
        }

        async function init() {
            if (!lobbyId) {
                document.body.innerHTML = '<div style="color:#FFD700;padding:20px;">Lobby ID not specified in URL (?lobbyId=...)</div>';
                return;
            }

            await fetchState();
            if (!pollTimer) pollTimer = setInterval(fetchState, 1000);
        }

        init();
    </script>
</body>
</html>
