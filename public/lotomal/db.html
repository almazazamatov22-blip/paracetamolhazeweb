<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotomal DB Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0f1a; color: #e0e0f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #161929; border: 1px solid #2a2d4a; border-radius: 16px; padding: 40px; width: 360px; text-align: center; }
  .login-box h1 { color: #FFD700; font-size: 24px; margin-bottom: 8px; }
  .login-box p { color: #888; font-size: 14px; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 12px 16px; background: #0d0f1a; border: 1px solid #2a2d4a; border-radius: 8px; color: #fff; font-size: 15px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: #FFD700; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
  .btn-gold { background: #FFD700; color: #000; }
  .btn-gold:hover { background: #ffe030; transform: translateY(-1px); }
  .btn-red { background: #e53e3e; color: #fff; }
  .btn-red:hover { background: #fc4f4f; }
  .btn-blue { background: #3182ce; color: #fff; }
  .btn-blue:hover { background: #4299e1; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

  #app { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: gap; }
  .header h1 { color: #FFD700; font-size: 22px; }
  .header .meta { color: #888; font-size: 13px; margin-top: 4px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 8px 20px; border-radius: 8px; cursor: pointer; border: 1px solid #2a2d4a; color: #aaa; background: transparent; font-size: 14px; transition: all .2s; }
  .tab.active { background: #FFD700; color: #000; border-color: #FFD700; font-weight: 700; }
  .tab:hover:not(.active) { border-color: #FFD700; color: #FFD700; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #161929; border: 1px solid #2a2d4a; border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .val { font-size: 32px; font-weight: 700; color: #FFD700; }
  .stat-card .lbl { font-size: 13px; color: #888; margin-top: 4px; }

  .section-title { font-size: 16px; font-weight: 700; color: #FFD700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .search-bar { width: 100%; padding: 10px 14px; background: #161929; border: 1px solid #2a2d4a; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 14px; outline: none; }
  .search-bar:focus { border-color: #FFD700; }

  table { width: 100%; border-collapse: collapse; }
  th { background: #161929; color: #FFD700; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; padding: 10px 14px; text-align: left; border-bottom: 1px solid #2a2d4a; }
  td { padding: 10px 14px; border-bottom: 1px solid #1a1d2e; font-size: 13px; vertical-align: middle; }
  tr:hover td { background: #161929; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .badge-waiting { background: #2d5a1b; color: #68d391; }
  .badge-playing { background: #2a1a5e; color: #9f7aea; }
  .badge-finished { background: #3d1a1a; color: #fc8181; }
  .avatar-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .has-avatar { background: #48bb78; }
  .no-avatar { background: #4a5568; }

  .players-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .player-tag { background: #1a1d2e; border: 1px solid #2a2d4a; border-radius: 4px; padding: 2px 8px; font-size: 12px; }
  .player-tag.is-admin { border-color: #FFD700; color: #FFD700; }

  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .danger-zone { background: #1a0a0a; border: 1px solid #7a1a1a; border-radius: 12px; padding: 20px; margin-top: 30px; }
  .danger-zone h3 { color: #fc8181; margin-bottom: 12px; }
  .danger-zone p { color: #aaa; font-size: 13px; margin-bottom: 16px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a2a1a; border: 1px solid #48bb78; color: #48bb78; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 999; animation: fadeIn .3s; }
  .toast.err { background: #2a1a1a; border-color: #fc8181; color: #fc8181; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .empty { text-align: center; color: #555; padding: 40px; font-size: 14px; }
  .loading { text-align: center; color: #888; padding: 40px; }
  .drawn-nums { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; color: #888; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>🎲 Lotomal</h1>
    <p>Панель управления базой данных</p>
    <input type="password" id="pwdInput" placeholder="Введите пароль" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-gold" style="width:100%" onclick="login()">Войти</button>
    <p id="loginErr" style="color:#fc8181;font-size:13px;margin-top:10px;display:none">Неверный пароль</p>
  </div>
</div>

<div id="app">
  <div class="header">
    <div>
      <h1>🎲 Lotomal DB Panel</h1>
      <div class="meta" id="lastRefresh"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-blue" onclick="loadData()">🔄 Обновить</button>
      <button class="btn" style="background:#2a2d4a;color:#ccc" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('lobbies')">🎮 Лобби</button>
    <button class="tab" onclick="switchTab('users')">👥 Игроки</button>
  </div>

  <div id="tabLobbies">
    <input class="search-bar" placeholder="🔍 Поиск лобби по коду, названию..." id="lobbySearch" oninput="renderLobbies()">
    <div id="lobbiesTable"></div>
  </div>

  <div id="tabUsers" style="display:none">
    <input class="search-bar" placeholder="🔍 Поиск игроков по нику..." id="userSearch" oninput="renderUsers()">
    <div id="usersTable"></div>
  </div>

  <div class="danger-zone">
    <h3>⚠️ Опасная зона</h3>
    <p>Полный сброс удалит ВСЕХ игроков, все лобби и всю статистику. Это необратимо!</p>
    <button class="btn btn-red" onclick="resetAll()">💥 Сбросить всё состояние</button>
  </div>
</div>

<script>
        const WORKER = 'https://lotomal.paracetamol.workers.dev';
let token = '';
let data = { users: [], lobbies: [] };
let currentTab = 'lobbies';

function login() {
  const pwd = document.getElementById('pwdInput').value;
  if (!pwd) return;
  token = pwd;
  loadData().then(ok => {
    if (ok) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      localStorage.setItem('dbToken', token);
    } else {
      document.getElementById('loginErr').style.display = 'block';
      token = '';
    }
  });
}

function logout() {
  token = '';
  localStorage.removeItem('dbToken');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwdInput').value = '';
}

async function api(path, method = 'GET') {
  const sep = path.includes('?') ? '&' : '?';
  const res = await fetch(`${WORKER}/api/admin${path}${sep}token=${encodeURIComponent(token)}`, { method });
  return res;
}

async function loadData() {
  try {
    const res = await api('/db');
    if (res.status === 401) return false;
    data = await res.json();
    renderStats();
    renderLobbies();
    renderUsers();
    document.getElementById('lastRefresh').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru');
    return true;
  } catch(e) { return false; }
}

function renderStats() {
  const { users, lobbies } = data;
  const waiting = lobbies.filter(l => l.status === 'waiting').length;
  const playing = lobbies.filter(l => l.status === 'playing').length;
  const withAvatar = users.filter(u => u.hasAvatar).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="val">${users.length}</div><div class="lbl">Игроков</div></div>
    <div class="stat-card"><div class="val">${lobbies.length}</div><div class="lbl">Лобби всего</div></div>
    <div class="stat-card"><div class="val" style="color:#68d391">${waiting}</div><div class="lbl">Ожидают</div></div>
    <div class="stat-card"><div class="val" style="color:#9f7aea">${playing}</div><div class="lbl">Играют</div></div>
    <div class="stat-card"><div class="val">${withAvatar}</div><div class="lbl">С аватаркой</div></div>
  `;
}

function renderLobbies() {
  const q = (document.getElementById('lobbySearch')?.value || '').toLowerCase();
  let list = data.lobbies.filter(l => !q || l.code?.toLowerCase().includes(q) || l.name?.toLowerCase().includes(q));
  list = [...list].sort((a,b) => (b.created_at||0) - (a.created_at||0));
  if (!list.length) {
    document.getElementById('lobbiesTable').innerHTML = '<div class="empty">Лобби не найдено</div>';
    return;
  }
  document.getElementById('lobbiesTable').innerHTML = `
    <table>
      <thead><tr>
        <th>Код</th><th>Название</th><th>Статус</th><th>Игроки</th>
        <th>Ходы</th><th>Создано</th><th>Действия</th>
      </tr></thead>
      <tbody>${list.map(l => `
        <tr>
          <td><b style="color:#FFD700;letter-spacing:.1em">${esc(l.code||'?')}</b></td>
          <td>${esc(l.name||'—')}</td>
          <td><span class="badge badge-${l.status}">${l.status}</span></td>
          <td>
            <div class="players-list">
              ${(l.players||[]).map(p => `<span class="player-tag ${p.is_admin?'is-admin':''}">${esc(p.nickname||p.id)}</span>`).join('')}
            </div>
            <div style="color:#555;font-size:11px;margin-top:3px">${(l.players||[]).length}/${l.max_players}</div>
          </td>
          <td><div class="drawn-nums">${(l.drawn_numbers||[]).length} чисел: ${(l.drawn_numbers||[]).slice(0,10).join(', ')}${(l.drawn_numbers||[]).length>10?'…':''}</div></td>
          <td style="color:#888;font-size:12px">${fmtTime(l.created_at)}</td>
          <td><div class="actions">
            <button class="btn btn-red btn-sm" onclick="deleteLobby('${l.id}','${esc(l.code)}')">🗑 Удалить</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderUsers() {
  const q = (document.getElementById('userSearch')?.value || '').toLowerCase();
  let list = data.users.filter(u => !q || (u.nickname||'').toLowerCase().includes(q));
  list = [...list].sort((a,b) => (b.last_seen||0) - (a.last_seen||0));
  if (!list.length) {
    document.getElementById('usersTable').innerHTML = '<div class="empty">Игроки не найдены</div>';
    return;
  }
  document.getElementById('usersTable').innerHTML = `
    <table>
      <thead><tr>
        <th>Аватар</th><th>Никнейм</th><th>Игр сыграно</th><th>Побед</th>
        <th>Последний раз</th><th>Действия</th>
      </tr></thead>
      <tbody>${list.map(u => `
        <tr>
          <td><span class="avatar-dot ${u.hasAvatar?'has-avatar':'no-avatar'}" title="${u.hasAvatar?'Есть аватарка':'Нет аватарки'}"></span></td>
          <td><b>${esc(u.nickname||'—')}</b><br><span style="color:#555;font-size:11px">${esc(u.id.slice(0,16))}…</span></td>
          <td>${u.games_played}</td>
          <td>${u.games_won}</td>
          <td style="color:#888;font-size:12px">${fmtTime(u.last_seen)}</td>
          <td><div class="actions">
            <button class="btn btn-sm" style="background:#2a3a2a;color:#68d391" onclick="resetStats('${u.id}','${esc(u.nickname)}')">↩ Сброс статы</button>
            <button class="btn btn-red btn-sm" onclick="deleteUser('${u.id}','${esc(u.nickname)}')">🗑 Удалить</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function deleteLobby(id, code) {
  if (!confirm(`Удалить лобби ${code}? Все игроки будут выкинуты.`)) return;
  const res = await api(`/lobby/${id}`, 'DELETE');
  if (res.ok) { toast('Лобби удалено'); loadData(); }
  else toast('Ошибка', true);
}

async function deleteUser(id, nick) {
  if (!confirm(`Удалить игрока ${nick}? Его профиль и статистика будут удалены.`)) return;
  const res = await api(`/user/${id}`, 'DELETE');
  if (res.ok) { toast('Игрок удалён'); loadData(); }
  else toast('Ошибка', true);
}

async function resetStats(id, nick) {
  if (!confirm(`Сбросить статистику ${nick}?`)) return;
  const res = await api(`/user/${id}/reset-stats`, 'POST');
  if (res.ok) { toast('Статистика сброшена'); loadData(); }
  else toast('Ошибка', true);
}

async function resetAll() {
  if (!confirm('ВНИМАНИЕ! Это удалит всё: игроков, лобби, статистику. Вы уверены?')) return;
  if (!confirm('Последний шанс отменить. Продолжить?')) return;
  const res = await api('/reset-all', 'POST');
  if (res.ok) { toast('Состояние очищено'); loadData(); }
  else toast('Ошибка', true);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLobbies').style.display = tab === 'lobbies' ? '' : 'none';
  document.getElementById('tabUsers').style.display = tab === 'users' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&tab==='lobbies')||(i===1&&tab==='users')));
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('ru', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function toast(msg, err=false) {
  const el = document.createElement('div');
  el.className = 'toast' + (err?' err':'');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Auto-login from saved token
window.onload = () => {
  const saved = localStorage.getItem('dbToken');
  if (saved) {
    token = saved;
    loadData().then(ok => {
      if (ok) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      } else { token = ''; localStorage.removeItem('dbToken'); }
    });
  }
};
// Auto-refresh every 30s
setInterval(() => { if (token) loadData(); }, 30000);
</script>
</body>
</html>
