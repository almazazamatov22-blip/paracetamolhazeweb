<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>CS2 Interactive Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Inter', sans-serif;
      position: relative;
    }

    /* ── Queue container (top-right) ── */
    #queue-container {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    /* ── Individual notification card ── */
    .notif-card {
      background: linear-gradient(135deg,
        rgba(0, 0, 0, 0.88) 0%,
        rgba(20, 20, 20, 0.92) 100%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateX(120%);
      opacity: 0;
      transition: none;
      position: relative;
      overflow: hidden;
    }

    .notif-card.enter {
      animation: cs2-slide-in 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .notif-card.exit {
      animation: cs2-slide-out 0.35s ease-in forwards;
    }

    @keyframes cs2-slide-in {
      0%   { transform: translateX(120%); opacity: 0; }
      60%  { transform: translateX(-8px); opacity: 1; }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes cs2-slide-out {
      0%   { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    /* Accent bar on left edge */
    .notif-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 14px 0 0 14px;
    }

    .notif-card.status-pending::before   { background: #f59e0b; }
    .notif-card.status-processing::before { background: #60a5fa; animation: cs2-bar-pulse 0.8s ease-in-out infinite; }
    .notif-card.status-done::before      { background: #1ed760; }
    .notif-card.status-error::before     { background: #f87171; }

    @keyframes cs2-bar-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Shimmer on processing */
    .notif-card.status-processing::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      animation: cs2-shimmer 1.5s ease-in-out infinite;
    }

    @keyframes cs2-shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Avatar */
    .notif-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.1);
    }

    .notif-avatar-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    /* Text */
    .notif-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .notif-user {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notif-reward {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notif-action {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-family: monospace;
    }

    /* Status icon */
    .notif-status-icon {
      font-size: 20px;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    /* ── Full-screen flash for OBS ──
       Kept below the notification banner so the notification remains visible. */
    #flash-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      will-change: opacity;
    }



    /* ── Big activation banner (center-bottom) ── */
    #banner-container {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .banner-card {
      background: linear-gradient(135deg,
        rgba(0,0,0,0.9) 0%,
        rgba(15,15,15,0.95) 100%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 16px 48px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.08);
      max-width: 500px;
      text-align: left;
    }

    .banner-card.enter {
      animation: cs2-banner-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .banner-card.exit {
      animation: cs2-banner-out 0.4s ease-in forwards;
    }

    @keyframes cs2-banner-in {
      0%   { transform: scale(0.7) translateY(30px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes cs2-banner-out {
      0%   { transform: scale(1) translateY(0); opacity: 1; }
      100% { transform: scale(0.85) translateY(20px); opacity: 0; }
    }

    .banner-icon { font-size: 40px; flex-shrink: 0; }

    .banner-info { display: flex; flex-direction: column; gap: 4px; }

    .banner-user {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .banner-reward {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .banner-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    /* Progress bar at bottom of banner */
    .banner-progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #1ed760, #0aad48);
      border-radius: 0 0 20px 20px;
      animation: cs2-progress var(--banner-dur, 4s) linear forwards;
    }

    @keyframes cs2-progress {
      from { width: 100%; }
      to { width: 0%; }
    }

    /* Particle burst on done */
    .particle-burst {
      position: fixed;
      pointer-events: none;
      z-index: 30;
    }

    .particle-burst .p {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: cs2-burst calc(0.6s + var(--d, 0s)) ease-out forwards;
    }

    @keyframes cs2-burst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx, 0), var(--ty, 0)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="flash-overlay"></div>
  <div id="banner-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function() {
        const params = new URLSearchParams(window.location.search);
        const STREAMER_ID = params.get('streamerId') || '';
        const BASE_URL = params.get('baseUrl') || (window.location.origin !== 'null' ? window.location.origin : 'https://paracetamolhaze.ru');

        let ACTION_REGISTRY = {};

        const bannerEl = document.getElementById('banner-container');
        const flashOverlayEl = document.getElementById('flash-overlay');
        const flashSound = new Audio('/sounds/flash.mp3');
        const streamSound = new Audio('/sounds/stream.mp3');

        let flashVisualTimer = null;
        let flashFadeTimer = null;

        function triggerFlash(durationMs = 3000) {
          flashSound.currentTime = 0;
          flashSound.play().catch(console.error);

          const totalMs = Math.max(3000, Number(durationMs) || 3000);
          const holdMs = Math.min(1200, Math.max(1000, Math.round(totalMs / 3)));
          const fadeMs = Math.max(300, totalMs - holdMs);

          if (flashVisualTimer) clearTimeout(flashVisualTimer);
          if (flashFadeTimer) clearTimeout(flashFadeTimer);

          flashOverlayEl.style.transition = 'none';
          flashOverlayEl.style.opacity = '1';

          // Force style application so repeated rewards restart the flash.
          void flashOverlayEl.offsetWidth;

          flashVisualTimer = setTimeout(() => {
            flashOverlayEl.style.transition = `opacity ${fadeMs}ms linear`;
            flashOverlayEl.style.opacity = '0';
          }, holdMs);

          flashFadeTimer = setTimeout(() => {
            flashOverlayEl.style.transition = 'none';
            flashOverlayEl.style.opacity = '0';
          }, totalMs + 100);
        }

        function triggerStreamSound() {
          streamSound.currentTime = 0;
          streamSound.play().catch(console.error);
        }

        let bannerTimer = null;
        let countdownTimer = null;

        // ── Banner (big central notification) ──
        function showBanner(event, remainingMs, durationMs) {
          if (bannerTimer) {
            clearTimeout(bannerTimer);
            if (countdownTimer) clearInterval(countdownTimer);
            const old = bannerEl.querySelector('.banner-card');
            if (old) { old.remove(); }
          }

          const actionCfg = ACTION_REGISTRY[event.action_type] || { icon: '🎮', label: event.action_type };
          const icon = actionCfg.icon;

          const card = document.createElement('div');
          card.className = 'banner-card enter';
          card.style.position = 'relative';
          card.style.setProperty('--banner-dur', (remainingMs / 1000) + 's');
          card.innerHTML = `
            ${event.user_avatar
              ? `<img class="banner-avatar" src="${event.user_avatar}" alt="" onerror="this.style.display='none'" />`
              : ''
            }
            <div class="banner-icon">
              ${(icon && (icon.startsWith('http') || icon.startsWith('/'))) 
                ? `<img src="${icon}" style="width: 40px; height: 40px; object-fit: contain;" alt="" />`
                : icon}
            </div>
            <div class="banner-info">
              <div class="banner-user">${event.user_name} активировал</div>
              <div class="banner-reward">${event.reward_name || actionCfg.label} <span id="banner-countdown" style="opacity:0.6;font-size:0.9em;margin-left:8px;"></span></div>
            </div>
            <div class="banner-progress"></div>
          `;

          bannerEl.appendChild(card);

          const countdownEl = card.querySelector('#banner-countdown');
          const targetTime = Date.now() + remainingMs;
          
          function updateCountdown() {
            const rem = Math.ceil((targetTime - Date.now()) / 1000);
            if (rem > 0) {
              countdownEl.textContent = rem + 's';
            } else {
              countdownEl.textContent = '';
            }
          }
          
          updateCountdown();
          countdownTimer = setInterval(updateCountdown, 250);

          bannerTimer = setTimeout(() => {
            clearInterval(countdownTimer);
            card.classList.remove('enter');
            card.classList.add('exit');
            setTimeout(() => card.remove(), 450);
          }, remainingMs);
        }

        const seenForBanner = new Set();
        const seenForEffects = new Set();
        let overlayConfig = null;
        let reconcileInFlight = false;

        function getDurationMs(ev) {
          const registryDuration = Number(ACTION_REGISTRY[ev.action_type]?.durationMs);
          if (registryDuration > 0) return registryDuration;
          const eventDuration = Number(ev.duration_ms);
          return eventDuration > 0 ? eventDuration : 2000;
        }

        function maybeShowBanner(ev) {
          if (!ev || seenForBanner.has(ev.id)) return;

          const durationMs = getDurationMs(ev);
          const startedAt = ev.started_at ? new Date(ev.started_at).getTime() : NaN;
          let remainingMs = Number.isFinite(startedAt)
            ? (startedAt + durationMs) - Date.now()
            : 0;

          // A fast action can change processing -> done before OBS receives the
          // processing event. Keep a short done fallback for those actions.
          if (ev.status === 'done' && durationMs <= 2500) {
            remainingMs = Math.max(remainingMs, 1800);
          }

          // A processing claim without started_at is intentionally ignored. The
          // agent writes started_at only after the helper confirms STARTED.
          if (ev.status === 'processing' && !Number.isFinite(startedAt)) return;
          if (remainingMs <= 0) return;

          seenForBanner.add(ev.id);
          showBanner(ev, remainingMs, durationMs);
        }

        function handleEvent(ev) {
          if (!ev) return;

          if (ev.status === 'processing' || ev.status === 'done') {
            maybeShowBanner(ev);
          }

          const effectHasStarted = ev.status === 'done' ||
            (ev.status === 'processing' && Boolean(ev.started_at));

          if (effectHasStarted && !seenForEffects.has(ev.id)) {
            seenForEffects.add(ev.id);
            if (ev.action_type === 'flash_screen') {
              triggerFlash(getDurationMs(ev));
            } else if (ev.action_type === 'play_sound') {
              triggerStreamSound();
            }
          }
        }

        async function reconcileProcessing() {
          if (!overlayConfig || reconcileInFlight) return;
          reconcileInFlight = true;
          try {
            const url = `${overlayConfig.supabaseUrl}/rest/v1/cs2_reward_queue?streamer_id=eq.${STREAMER_ID}&status=eq.processing&started_at=not.is.null&order=created_at.desc&limit=5`;
            const res = await fetch(url, {
              cache: 'no-store',
              headers: {
                'apikey': overlayConfig.supabaseAnonKey,
                'Authorization': `Bearer ${overlayConfig.supabaseAnonKey}`,
              },
            });
            if (!res.ok) return;
            const events = await res.json();
            for (const ev of (events || [])) handleEvent(ev);
          } catch (e) {
            console.warn('[CS2 Overlay] Reconcile failed:', e);
          } finally {
            reconcileInFlight = false;
          }
        }

        let lastRecoverySyncAt = 0;
        const RECOVERY_SYNC_COOLDOWN_MS = 10_000;

        function recoverySync() {
          const now = Date.now();
          if (now - lastRecoverySyncAt < RECOVERY_SYNC_COOLDOWN_MS) return;

          lastRecoverySyncAt = now;
          void reconcileProcessing();
        }

        window.addEventListener('online', recoverySync);
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            recoverySync();
          }
        });

        let client = null;
        let channel = null;

        window.addEventListener('pagehide', () => {
          if (client && channel) {
            client.removeChannel(channel);
          }
        });

        async function init() {
          if (!STREAMER_ID) {
            console.warn('⚠️ streamerId не задан в URL');
            return;
          }

          try {
            // Get Config
            const cfgRes = await fetch(`${BASE_URL}/api/cs2/agent/config`);
            const cfg = await cfgRes.json();
            overlayConfig = cfg;
            ACTION_REGISTRY = cfg.actions || {};
            
            // Get Initial pending or processing
            const initialRes = await fetch(`${cfg.supabaseUrl}/rest/v1/cs2_reward_queue?streamer_id=eq.${STREAMER_ID}&status=in.(pending,processing)&order=created_at.asc`, {
              headers: { 'apikey': cfg.supabaseAnonKey, 'Authorization': `Bearer ${cfg.supabaseAnonKey}` }
            });
            const initialEvents = await initialRes.json();
            for (const ev of (initialEvents || [])) {
              handleEvent(ev);
            }

            // Realtime
            client = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
            channel = client.channel(`cs2-overlay:${STREAMER_ID}`)
              .on('postgres_changes', { event: '*', schema: 'public', table: 'cs2_reward_queue', filter: `streamer_id=eq.${STREAMER_ID}` }, payload => {
                handleEvent(payload.new);
              })
              .subscribe(status => {
                if (status === 'SUBSCRIBED') recoverySync();
              });

          } catch(e) {
            console.error('[CS2 Overlay] Init error:', e);
          }
        }
        
        init();
      })();
    </script>
</body>
</html>
