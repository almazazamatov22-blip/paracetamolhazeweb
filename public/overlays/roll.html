<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fate Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Martian+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --panel-top: 40px;
            --panel-radius: 18px;
            --panel-bg-color: #101014;
            --white: #ffffff;
            --num-color: #ffffff;
            --muted: rgba(255, 255, 255, 0.78);
            --green: #28d17c;
            --red: #ff4d4d;

            --name-size: 50px;
            --title-size: 50px;
            --num-size: 100px;
            --vs-size: 54px;
            --label-bg: rgba(0, 0, 0, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1620px; height: 290px;
            overflow: hidden; background: transparent;
            font-family: 'Inter', sans-serif; color: white;
        }

        #wrap {
            position: absolute; left: 50%; top: -310px;
            width: 1600px; height: 210px;
            transform: translateX(-50%); opacity: 0;
            border-radius: var(--panel-radius);
            background-color: var(--panel-bg-color);
            background-size: cover; background-position: center;
            box-shadow: 0 14px 45px rgba(0, 0, 0, .45);
            display: grid; grid-template-columns: 480px 560px 480px; align-items: center;
            padding: 0 40px;
            transition: top 650ms cubic-bezier(0.19, 1, 0.22, 1), opacity 300ms ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 9999;
        }

        #wrap.show { top: var(--panel-top); opacity: 1; }
        #wrap.hide { top: -310px; opacity: 0; }

        #left-side { width: 480px; min-width: 0; display: grid; grid-template-columns: 320px 130px; align-items: center; gap: 16px; padding-right: 14px; }
        #user { width: 320px; min-width: 0; max-width: none; font-size: 40px; font-weight: 900; color: var(--white); text-shadow: 0 6px 20px rgba(0, 0, 0, .6); text-transform: uppercase; line-height: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
        #avatar { width: 130px; height: 130px; min-width: 130px; border-radius: 12px; background: #222; object-fit: cover; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4); flex: none; }

        #center-side { width: 560px; min-width: 560px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .col { text-align: center; }
        .labelWrap { display: inline-block; background: var(--label-bg); border-radius: 8px; padding: 4px 12px; margin-bottom: 6px; }
        .label { font-size: 16px; font-weight: 800; color: var(--muted); text-transform: uppercase; line-height: 1; }
        .num { font-size: var(--num-size); font-weight: 900; font-family: 'Martian Mono', monospace; color: var(--num-color); line-height: 1; min-width: 145px; text-shadow: 0 8px 24px rgba(0, 0, 0, .7); }
        #vs { font-size: var(--vs-size); font-weight: 900; color: var(--white); opacity: 1; text-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); }

        #right-side { width: 480px; min-width: 0; display: grid; grid-template-columns: 320px 144px; align-items: center; gap: 16px; padding: 0; }
        #rewardTitle { width: 320px; max-width: 320px; min-width: 0; font-size: 40px; font-weight: 900; color: var(--white); text-align: left; text-transform: uppercase; line-height: 1; overflow: hidden; text-overflow: ellipsis; overflow-wrap: anywhere; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        #rewardImg { width: 144px; height: 140px; min-width: 144px; display: flex; align-items: center; justify-content: center; }
        #rewardImg img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.4)); }

        #badge { position: absolute; right: 150px; bottom: -25px; font-size: 32px; font-weight: 900; padding: 8px 30px; border-radius: 99px; opacity: 0; transform: scale(.8); transition: all 0.3s; z-index: 50; }
        #badge.show { opacity: 1; transform: scale(1) translateY(-15px); }
        #badge.win { background: var(--green); color: white; box-shadow: 0 8px 20px rgba(40, 209, 124, 0.4); }
        #badge.lose { background: var(--red); color: white; }

        .rollFlash { animation: flash .1s linear infinite; }
        @keyframes flash { 0%, 100% { opacity: 1 } 50% { opacity: .4 } }
        .shake { animation: shake .4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-10px, 0); } 75% { transform: translate(10px, 0); } }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="left-side">
            <div id="user">PLAYER</div>
            <img src="" id="avatar">
        </div>

        <div id="center-side">
            <div class="col">
                <div class="labelWrap"><div class="label">Число зрителя</div></div>
                <div class="num" id="pickNum">00</div>
            </div>
            <div id="vs">VS</div>
            <div class="col">
                <div class="labelWrap"><div class="label">Число рандома</div></div>
                <div class="num" id="rollNum">00</div>
            </div>
        </div>

        <div id="right-side">
            <div id="rewardTitle">REWARD NAME</div>
            <div id="rewardImg"></div>
        </div>

        <div id="badge"></div>
    </div>

    <audio id="sIn" preload="auto"></audio>
    <audio id="sRoll" preload="auto"></audio>
    <audio id="sWin" preload="auto"></audio>
    <audio id="sLose" preload="auto"></audio>
    <audio id="sOut" preload="auto"></audio>

    <script>
        const T_IN = 650;
        const T_STAND = 1000;
        const T_ROLL = 3000;
        const T_AFTER = 2000;
        const T_OUT = 650;

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        let supabaseClient = null;
        let realtimeChannel = null;
        let globalConfig = null;

        let isRunning = false;
        const eventQueue = [];
        let currentlyProcessingId = null;

        async function init() {
            if (!userId) return;

            console.log('[FATE_OBS] Initialization started', { userId });

            try {
                const res = await fetch('/api/ov_env');
                const env = await res.json();
                if(!env.supabaseUrl || !env.supabaseAnonKey) throw new Error('No Supabase Env');

                supabaseClient = window.supabase.createClient(env.supabaseUrl, env.supabaseAnonKey);
                console.log('[FATE_OBS] Supabase client created');

                // Initial load
                await loadConfig();
                await fetchPendingEvents();

                // Subscriptions
                setupRealtime();

                // Start queue processor
                setInterval(processQueue, 500);

            } catch (e) {
                console.error('[FATE_OBS] Initialization error:', e);
            }
        }

        async function loadConfig() {
            try {
                const { data, error } = await supabaseClient
                    .from('overlay_configs')
                    .select('settings, assets')
                    .eq('user_id', userId)
                    .eq('overlay_type', 'fate')
                    .maybeSingle();

                if (error && error.code !== 'PGRST116') {
                    console.error("[FATE_OBS] Config error:", error);
                }

                if (!data) {
                    // Try fallback
                    const { data: legacy, error: legacyError } = await supabaseClient
                        .from('overlay_configs')
                        .select('settings, assets')
                        .eq('user_id', userId)
                        .maybeSingle();

                    if (legacyError && legacyError.code !== 'PGRST116') {
                        console.error("[FATE_OBS] Legacy config error:", legacyError);
                    }
                    if(legacy) {
                        globalConfig = legacy;
                    }
                } else {
                    globalConfig = data;
                }
            } catch (e) {
                console.error("[FATE_OBS] Load config error:", e);
            }
        }

        async function fetchPendingEvents() {
            try {
                const { data, error } = await supabaseClient
                    .from('overlay_events')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('overlay_type', 'fate')
                    .eq('status', 'pending')
                    .order('created_at', { ascending: true });

                if (error) {
                    console.error("[FATE_OBS] Pending events error:", error);
                    return;
                }

                if (data && data.length > 0) {
                    data.forEach(evt => {
                        if (!eventQueue.some(e => e.id === evt.id) && evt.id !== currentlyProcessingId) {
                            eventQueue.push(evt);
                        }
                    });
                }
            } catch(e) {
                console.error("[FATE_OBS] Fetch events exception:", e);
            }
        }

        function setupRealtime() {
            realtimeChannel = supabaseClient.channel('obs_fate_' + userId)
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'overlay_events', filter: `user_id=eq.${userId}` },
                    (payload) => {
                        console.log('[FATE_OBS] Event received:', payload.new);
                        const evt = payload.new;
                        if (evt.overlay_type === 'fate' && evt.status === 'pending') {
                            if (!eventQueue.some(e => e.id === evt.id) && evt.id !== currentlyProcessingId) {
                                eventQueue.push(evt);
                            }
                        }
                    }
                )
                .on(
                    'postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'overlay_configs', filter: `user_id=eq.${userId}` },
                    (payload) => {
                        const cfg = payload.new;
                        if (cfg.overlay_type === 'fate' || !cfg.overlay_type) {
                            globalConfig = cfg;
                        }
                    }
                )
                .subscribe(async (status) => {
                    console.log('[FATE_OBS] Realtime status:', status);
                    if (status === 'SUBSCRIBED') {
                        // Fetch missed events just in case
                        await fetchPendingEvents();
                    } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
                        console.error('[FATE_OBS] Realtime error:', status);
                    }
                });
        }

        window.addEventListener('beforeunload', () => {
             if (realtimeChannel && supabaseClient) {
                 supabaseClient.removeChannel(realtimeChannel);
             }
        });

        async function processQueue() {
            if (isRunning || eventQueue.length === 0) return;

            const evt = eventQueue.shift();
            currentlyProcessingId = evt.id;
            isRunning = true;

            try {
                // Try to claim atomically
                const { data: claimed, error } = await supabaseClient.rpc('claim_overlay_event', {
                    p_event_id: evt.id,
                    p_user_id: userId
                });

                if (error) {
                    console.error("[FATE_OBS] Claim error:", error);
                    isRunning = false;
                    currentlyProcessingId = null;
                    return;
                }

                if (claimed) {
                    console.log('[FATE_OBS] Event claimed:', evt.id);
                    console.log('[FATE_OBS] Animation started:', evt.id);
                    await animate(evt);

                    // Mark completed
                    const { error: completeError } = await supabaseClient
                        .from('overlay_events')
                        .update({ status: 'completed', completed_at: new Date().toISOString() })
                        .eq('id', evt.id);

                    if (completeError) {
                        console.error('[FATE_OBS] Complete error:', completeError);
                    } else {
                        console.log('[FATE_OBS] Event completed:', evt.id);
                    }
                }
            } catch (e) {
                console.error("[FATE_OBS] Process exception:", e);
            }

            isRunning = false;
            currentlyProcessingId = null;
        }

        function play(id) {
            const a = document.getElementById(id);
            if (a && a.src) {
                a.currentTime = 0;
                a.play().catch(e => {
                    console.error(`[FATE_OBS] Audio play error for ${id}:`, e);
                });
            }
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function updateRewardTitle(value) {
            const el = document.getElementById('rewardTitle');
            const text = typeof value === 'string' && value.trim() ? value.trim() : 'Награда';

            el.textContent = text;

            const length = Array.from(text).length;

            if (length > 28) {
                el.style.fontSize = '28px';
                el.style.lineHeight = '1.05';
            } else if (length > 20) {
                el.style.fontSize = '32px';
                el.style.lineHeight = '1';
            } else if (length > 14) {
                el.style.fontSize = '36px';
                el.style.lineHeight = '1';
            } else {
                el.style.fontSize = '40px';
                el.style.lineHeight = '1';
            }
        }

        async function animate(evt) {
            const data = evt.payload || {};
            const globalAssets = globalConfig?.assets || {};
            const assets = data.assets || globalAssets; // Prefer payload assets for specific reward

            const wrap = document.getElementById('wrap');
            const userEl = document.getElementById('user');
            const avatarEl = document.getElementById('avatar');
            const pickEl = document.getElementById('pickNum');
            const rollEl = document.getElementById('rollNum');
            const badge = document.getElementById('badge');
            const centerSide = document.getElementById('center-side');

            // Apply assets directly before showing
            if (assets.panel_bg) wrap.style.backgroundImage = `url(${assets.panel_bg})`;
            else wrap.style.backgroundImage = 'none';

            const rewardImage = assets.reward_icon || assets.reward_img;
            const rewardImgContainer = document.getElementById('rewardImg');
            rewardImgContainer.innerHTML = '';
            if (rewardImage) {
                const img = document.createElement('img');
                img.src = rewardImage;
                img.onerror = () => { img.style.display = 'none'; };
                rewardImgContainer.appendChild(img);
            }

            updateRewardTitle(
                evt.reward_name ||
                evt.rewardTitle ||
                'Награда'
            );

            [
                ['sIn', assets.sound_in || assets.s_in || '/overlays/defaults/sounds/in.mp3'],
                ['sRoll', assets.sound_loop || assets.sound_roll || assets.s_roll || '/overlays/defaults/sounds/roll.mp3'],
                ['sWin', assets.sound_win || assets.s_win || '/overlays/defaults/sounds/win.mp3'],
                ['sLose', assets.sound_lose || assets.s_lose || '/overlays/defaults/sounds/lose.mp3'],
                ['sOut', assets.sound_out || assets.s_out || '/overlays/defaults/sounds/out.mp3']
            ].forEach(([id, url]) => {
                const audio = document.getElementById(id);
                if (audio && url && audio.src !== url && audio.src !== window.location.origin + url) {
                    audio.src = url;
                    audio.load();
                }
            });

            badge.className = "";
            badge.textContent = "";
            centerSide.classList.remove('shake');
            rollEl.classList.remove('rollFlash');
            rollEl.style.color = "var(--white)";

            userEl.textContent = evt.viewer_name || "PLAYER";
            if (evt.viewer_avatar) {
                avatarEl.src = evt.viewer_avatar;
                avatarEl.style.display = '';
            } else {
                avatarEl.removeAttribute('src');
                avatarEl.style.display = 'none';
            }

            avatarEl.onerror = () => {
                avatarEl.removeAttribute('src');
                avatarEl.style.display = 'none';
            };

            pickEl.textContent = (data.userChoice || 0).toString().padStart(2, '0');
            rollEl.textContent = "00";

            wrap.classList.remove('hide');
            wrap.classList.add('show');
            play('sIn');
            await sleep(T_IN);

            await sleep(T_STAND);

            play('sRoll');
            rollEl.classList.add('rollFlash');
            const startRoll = Date.now();
            while (Date.now() - startRoll < T_ROLL) {
                rollEl.textContent = Math.floor(Math.random() * 99 + 1).toString().padStart(2, '0');
                await sleep(60);
            }
            rollEl.classList.remove('rollFlash');

            let resultNum = Number(data.result);
            if (!Number.isFinite(resultNum) || resultNum <= 0) {
                resultNum = Math.floor(Math.random() * 99 + 1);
            }
            rollEl.textContent = resultNum.toString().padStart(2, '0');

            const isWin = parseInt(rollEl.textContent) === parseInt(pickEl.textContent);
            badge.textContent = isWin ? "ПОБЕДА!" : "ПРОИГРЫШ";
            badge.classList.add('show', isWin ? 'win' : 'lose');
            rollEl.style.color = isWin ? "var(--green)" : "var(--red)";
            if (isWin) play('sWin'); else { play('sLose'); centerSide.classList.add('shake'); }

            await sleep(T_AFTER);

            play('sOut');
            wrap.classList.remove('show');
            wrap.classList.add('hide');
            await sleep(T_OUT);
        }

        // Start
        init();

    </script>
</body>
</html>
