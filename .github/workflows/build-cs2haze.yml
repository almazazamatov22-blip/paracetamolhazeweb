name: Build cs2haze

on:
  workflow_dispatch:
  push:
    tags:
      - "cs2haze-v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build cs2haze
        shell: powershell
        run: |
          .\desktop\cs2haze\scripts\build-cs2haze.ps1 -RepoRoot $PWD

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CS2Haze-Setup
          path: desktop/cs2haze/dist/CS2Haze-Setup.exe

      - name: Upload runtime
        uses: actions/upload-artifact@v4
        with:
          name: cs2haze-runtime
          path: |
            desktop/cs2haze/dist/cs2haze-runtime.zip
            desktop/cs2haze/dist/cs2haze-runtime.sha256

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/cs2haze-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/cs2haze/dist/CS2Haze-Setup.exe
            desktop/cs2haze/dist/cs2haze-runtime.zip
            desktop/cs2haze/dist/cs2haze-runtime.sha256
