name: Build cs2haze

on:
  workflow_dispatch:
  push:
    tags:
      - "cs2haze-v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Test protocol token store
        shell: powershell
        run: dotnet run --project .\desktop\cs2haze\tests\CS2Haze.TokenStoreSmoke.csproj -c Release

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build cs2haze
        shell: powershell
        run: |
          .\desktop\cs2haze\scripts\build-cs2haze.ps1 -RepoRoot $PWD

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CS2Haze-Setup
          path: desktop/cs2haze/dist/CS2Haze-Setup.exe

      - name: Upload runtime
        uses: actions/upload-artifact@v4
        with:
          name: cs2haze-runtime
          path: |
            desktop/cs2haze/dist/cs2haze-runtime.zip
            desktop/cs2haze/dist/cs2haze-runtime.sha256

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/cs2haze-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/cs2haze/dist/CS2Haze-Setup.exe
            desktop/cs2haze/dist/cs2haze-runtime.zip
            desktop/cs2haze/dist/cs2haze-runtime.sha256

      - name: Verify published installer
        if: startsWith(github.ref, 'refs/tags/cs2haze-v')
        shell: powershell
        run: |
          $tag = [Uri]::EscapeDataString($env:GITHUB_REF_NAME)
          $tagUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$tag/CS2Haze-Setup.exe"
          $latestUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/CS2Haze-Setup.exe"
          $expectedLatestPath = "/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/CS2Haze-Setup.exe"

          for ($attempt = 1; $attempt -le 12; $attempt++) {
            $allDownloadable = $true

            foreach ($url in @($tagUrl, $latestUrl)) {
              $headers = (& curl.exe -fsSIL --max-redirs 5 $url 2>&1) -join "`n"
              if (
                $LASTEXITCODE -ne 0 -or
                $headers -notmatch '(?im)^HTTP/\S+ 200\b' -or
                $headers -notmatch '(?im)^content-disposition:\s*attachment;.*filename=CS2Haze-Setup\.exe'
              ) {
                $allDownloadable = $false
                break
              }
            }

            $latestHeaders = (& curl.exe -fsSI --max-redirs 0 $latestUrl 2>&1) -join "`n"
            $latestLocation = [regex]::Match(
              $latestHeaders,
              '(?im)^location:\s*(.+)\s*$'
            ).Groups[1].Value.Trim()
            $latestPointsToTag = $false
            if ($latestLocation) {
              try {
                $latestPath = [Uri]::UnescapeDataString(([Uri]$latestLocation).AbsolutePath)
                $latestPointsToTag = $latestPath -eq $expectedLatestPath
              } catch {
                $latestPointsToTag = $false
              }
            }

            if ($allDownloadable -and $latestPointsToTag) {
              Write-Host "Published installer is downloadable."
              exit 0
            }

            Start-Sleep -Seconds 5
          }

          throw "Published installer did not become downloadable through both tag and latest URLs."
